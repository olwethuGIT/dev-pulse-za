<header class="p-3 w-full fixed top-0 z-50 bg-linear-to-r from-blue-500 to-[#7147ed] shadow-md">
  <div class="flex align-middle items-center px-10 mx-auto gap-6">
    <div class="text-white">
      <a routerLink="/" class="flex items-center gap-3 max-h-16 border-r-white border-r-2 pr-6">
        <h3 class="text-2xl font-semibold uppercase">Dev Pulse ZA</h3>
      </a>
    </div>

    <div class="flex items-center align-middle ml-auto gap-3">
      <app-theme-button class="ml-auto" />

      @if (accountService.currentUser(); as user) {
        <div class="dropdown dropdown-end">
          <div
            tabindex="0"
            role="button"
            class="flex items-center text-white text-xl gap-3 cursor-pointer"
          >
            <img
              [src]="user?.imageUrl || '/user.png'"
              alt="user avatar"
              class="w-10 h-10 rounded-full"
            />
            <span>{{ user.displayName }}</span>
          </div>
          <ul
            tabindex="-1"
            class="dropdown-content menu bg-base-100 rounded-box z-1 w-52 p-2 shadow-sm"
          >
            <li><a>Edit profile</a></li>
            <li><a>Add Article</a></li>
            <li><a (click)="logout()">logout</a></li>
          </ul>
        </div>
      } @else {
        <button class="btn btn-sm btn-primary" (click)="login()" type="submit">Login</button>
      }
    </div>
  </div>
</header>
