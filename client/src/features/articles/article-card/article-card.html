@if (article(); as article) {
  <div class="card bg-base-100 border border-base-300 hover:border-base-content/20 rounded-xl shadow-md p-4 hover:shadow-lg transition-all duration-200">
    <!-- Top -->
    <div class="flex justify-between text-xs text-base-400 mb-2">
      <div class="flex gap-2">
        <span class="bg-green-100 text-green-700 px-2 py-1 rounded">
          {{ article.categoryName }}
        </span>
      </div>
      <span>{{ article.createdAt }}h ago</span>
    </div>

    <!-- Title -->
    <h2
      routerLink="/article/{{ article.id }}"
      class="text-lg font-semibold cursor-pointer hover:text-blue-500"
    >
      {{ article.title }}
    </h2>

    <!-- Description -->
    <p class="text-sm text-gray-600 mt-2">
      {{ getPreview(article.content, 150) }}
    </p>

    <!-- Footer -->
    <div class="flex justify-between items-center mt-4 text-sm text-gray-500">
      <!-- <span>👤 {{ article.authorName }}</span> -->
      <span>⏱ {{ readTime }} min read</span>
      <div class="flex gap-4">
        <span
          ><app-like-button [likeCount]="article.likesCount" (clickEvent)="toggleLike(article.id)"
        /></span>
        <span><app-comment-button [commentsCount]="article.commentsCount" /></span>
        <span class="text-blue-500 cursor-pointer" routerLink="/article/{{ article.id }}">Read More</span>
      </div>
    </div>
  </div>
}
