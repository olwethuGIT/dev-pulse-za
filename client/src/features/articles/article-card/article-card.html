@if (article(); as article) {
  <div class="rounded-2xl shadow-md p-4 bg-white hover:shadow-lg transition">
    <!-- Top -->
    <div class="flex justify-between text-xs text-gray-500 mb-2">
      <div class="flex gap-2">
        <span class="bg-green-100 text-green-700 px-2 py-1 rounded">
          {{ article.category.name }}
        </span>
      </div>
      <span>{{ article.createdAt }}h ago</span>
    </div>

    <!-- Title -->
    <h2 class="text-lg font-semibold cursor-pointer hover:text-blue-500">
      {{ article.title }}
    </h2>

    <!-- Description -->
    <p class="text-sm text-gray-600 mt-2">
      {{ article.content }}
    </p>

    <!-- Footer -->
    <div class="flex justify-between items-center mt-4 text-sm text-gray-500">
      <span>👤 {{ article.author.displayName }}</span>
      <div class="flex gap-4">
        <span>👍 124</span>
        <span>💬 32</span>
        <span class="text-blue-500 cursor-pointer">Read More</span>
      </div>
    </div>
  </div>
}
