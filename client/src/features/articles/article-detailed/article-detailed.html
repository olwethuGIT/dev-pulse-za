@if (articleService.article(); as article) {
  <div class="max-w-3xl mx-auto p-4">
    <!-- Back -->
    <button class="text-sm text-blue-500 mb-4 cursor-pointer">← Back</button>

    <!-- Meta -->
    <div class="flex justify-between text-xs text-gray-500 mb-3">
      <div class="flex gap-2">
        <span class="bg-green-100 text-green-700 px-2 py-1 rounded">
          {{ article.category.name }}
        </span>
      </div>
      <span>{{ article.createdAt }}2h ago</span>
    </div>

    <!-- Title -->
    <h1 class="text-2xl font-bold text-gray-800">{{ article.title }}</h1>

    <!-- Author -->
    <div class="mt-2 text-sm text-gray-500">👤 {{ article.author.displayName }}</div>

    <!-- Divider -->
    <hr class="my-4" />

    <!-- Content -->
    <div class="prose max-w-none text-gray-700">
      <p>
        {{ article.content }}
      </p>
    </div>

    <!-- Divider -->
    <hr class="my-6" />

    <!-- Actions -->
    <div class="flex gap-6 text-gray-600 mb-6">
      <span><app-like-button [likeCount]="article.likes.length" (clickEvent)="toggleLike(article)"/></span>
      <span><app-comment-button /></span>
    </div>

    <!-- Comments Section -->
    <div>
      <h2 class="text-lg font-semibold mb-3">Comments</h2>

      <!-- Add Comment -->
      <textarea
        class="w-full border rounded-xl p-3 mb-3 focus:outline-none focus:ring-2 focus:ring-blue-400"
        placeholder="Write a comment..."
      ></textarea>

      <button class="bg-blue-500 text-white px-4 py-2 rounded-xl">Post Comment</button>

      <!-- Comment List -->
      <div class="mt-6 space-y-4">
        <div class="bg-gray-100 p-3 rounded-xl">
          <p class="text-sm font-medium">User1</p>
          <p class="text-sm text-gray-600">Great article!</p>
        </div>

        <div class="bg-gray-100 p-3 rounded-xl">
          <p class="text-sm font-medium">User2</p>
          <p class="text-sm text-gray-600">This is big for SA</p>
        </div>
      </div>
    </div>
  </div>
}
